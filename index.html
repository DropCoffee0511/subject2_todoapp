<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>할 일 목록</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1 id="app-title" class="app-title">할 일 목록</h1>
      </header>

      <section class="todo-input-section" aria-label="할 일 입력">
        <form class="todo-form" action="#" method="get">
          <label for="todoInput" class="visually-hidden">할 일 내용</label>
          <input
            id="todoInput"
            class="todo-input"
            name="todo"
            type="text"
            placeholder="할 일을 입력하세요"
            autocomplete="off"
            maxlength="200"
            required
          />
          <button id="addButton" type="button" class="todo-submit">추가</button>
        </form>
      </section>

      <section
        class="todo-list-section"
        aria-labelledby="todo-list-title"
      >
        <h2 id="todo-list-title" class="todo-list-title">내 할 일</h2>
        <div id="todoList" class="todo-list" aria-live="polite"></div>
        <p id="todo-empty" class="todo-empty">등록된 할 일이 없습니다.</p>
      </section>

      <footer class="app-status" aria-label="할 일 상태">
        <p id="todoCount" class="status-summary" role="status" aria-live="polite">
          총 0개의 할 일
        </p>
      </footer>
    </main>
    <script src="script.js"></script>
  </body>
</html>
